# SonarQube - MesaQR (Laravel 13 + Blade + Alpine)
# Ejecutar el escaneo desde la raiz del proyecto (mesaqr/).
# El token NO se guarda aqui: pasarlo por variable de entorno o linea de comandos.
#   sonar-scanner.bat -D"sonar.token=%SONAR_TOKEN%"
# (comillas alrededor de -D... para que PowerShell no lo trocee)

sonar.projectKey=PruebaProyecto
sonar.projectName=MesaQR
sonar.host.url=http://localhost:9000

# Fuentes analizadas
sonar.sources=app,routes,database,resources/views,config
sonar.tests=tests

# Codificacion
sonar.sourceEncoding=UTF-8

# Exclusiones: dependencias, assets compilados, cache, artefactos del scanner
sonar.exclusions=vendor/**,node_modules/**,public/build/**,storage/**,bootstrap/cache/**,.scannerwork/**

# Excluir tests de la duplicacion/cobertura de codigo fuente
sonar.test.inclusions=tests/**
